services:
  db:
    image: postgres:16-alpine
    container_name: worker-db
    environment:
      POSTGRES_DB: workerdb
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"

  backend:
    build: ./backend/glig
    container_name: worker-backend
    depends_on:
      - db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/workerdb
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: password
      # Käytetään prod-profiilia ja syötetään Auth0-tiedot ympäristömuuttujista
      SPRING_PROFILES_ACTIVE: prod
      OKTA_OAUTH2_ISSUER: ${AUTH0_ISSUER}
      OKTA_OAUTH2_AUDIENCE: ${AUTH0_AUDIENCE}
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend/workerfrontend
      dockerfile: Dockerfile
      args:
        # siirtävät muuttujat Dockerin buildiin
        VITE_API_URL: ${VITE_API_URL}
        VITE_AUTH_DOMAIN: ${VITE_AUTH_DOMAIN}
        VITE_AUTH_CLIENT_ID: ${VITE_AUTH_CLIENT_ID}
        VITE_AUTH_AUDIENCE: ${VITE_AUTH_AUDIENCE}
        VITE_GOOGLE_MAPS_API_KEY: ${VITE_GOOGLE_MAPS_API_KEY}
        VITE_DISABLE_AUTH0: ${VITE_DISABLE_AUTH0}
    container_name: worker-frontend
    depends_on:
      - backend
    ports:
      - "8081:80"
  
  robot:
    build: ./e2e-tests
    container_name: worker-robot
    depends_on:
      - frontend
    volumes:
      - ./e2e-tests:/tests
      - ./results:/tests/results
    environment:
      - FRONTEND_URL=http://worker-frontend:80
    profiles:
      - e2e
    # pakottaa domainin osoittamaan Docker-verkon sisään
    extra_hosts:
      - "tuomasleinonen.store:host-gateway"