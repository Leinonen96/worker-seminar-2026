name: Deploy to DigitalOcean

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run Backend Unit Tests
        working-directory: backend/glig
        run: mvn test -Dtest=!TestDataIntegrationTests#ResetDataBaseToOriginalStateAfterRemovingApplies
      - name: Copy project files to Droplet via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USERNAME }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          source: ".,!e2e-tests/results"
          target: "/home/${{ secrets.DROPLET_USERNAME }}/worker-app"

      - name: Build and deploy containers via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USERNAME }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          command_timeout: 30m
          script: |
            cd /home/${{ secrets.DROPLET_USERNAME }}/worker-app

            # 1. Exportataan muuttujat shellin ympäristöön
            export VITE_API_URL="${{ secrets.VITE_API_URL }}"
            export VITE_AUTH_DOMAIN="${{ secrets.VITE_AUTH_DOMAIN }}"
            export VITE_AUTH_CLIENT_ID="${{ secrets.VITE_AUTH_CLIENT_ID }}"
            export VITE_AUTH_AUDIENCE="${{ secrets.VITE_AUTH_AUDIENCE }}"
            export VITE_GOOGLE_MAPS_API_KEY="${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}"
            export VITE_DISABLE_AUTH0="${{ secrets.VITE_DISABLE_AUTH0 }}"
            export AUTH0_ISSUER="${{ secrets.AUTH0_ISSUER }}"
            export AUTH0_AUDIENCE="${{ secrets.AUTH0_AUDIENCE }}"

            # 2. Kirjoitetaan .env
            printf "VITE_API_URL=$VITE_API_URL\nVITE_AUTH_DOMAIN=$VITE_AUTH_DOMAIN\nVITE_AUTH_CLIENT_ID=$VITE_AUTH_CLIENT_ID\nVITE_AUTH_AUDIENCE=$VITE_AUTH_AUDIENCE\nVITE_GOOGLE_MAPS_API_KEY=$VITE_GOOGLE_MAPS_API_KEY\nVITE_DISABLE_AUTH0=$VITE_DISABLE_AUTH0\n" > frontend/workerfrontend/.env
            printf "AUTH0_ISSUER=$AUTH0_ISSUER\nAUTH0_AUDIENCE=$AUTH0_AUDIENCE\n" > .env

            # 3. Käynnistetään sovellus
            docker compose down
            docker compose build --no-cache frontend
            docker compose up -d

            # 4. Siivoataan vanhat testitulokset
            docker run --rm -v $(pwd)/e2e-tests:/app alpine rm -rf /app/results/*

            # 5. Ajetaan testit palvelimella (E2E)
            docker compose --profile e2e up robot --build --abort-on-container-exit
            
            # 6. Siivous
            docker image prune -f

      - name: Download Screenshots from server
        if: failure()
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USERNAME }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          source: "/home/${{ secrets.DROPLET_USERNAME }}/worker-app/e2e-tests/results/browser/screenshot/*.png"
          target: "failed_screenshots"
          strip_components: 6

      - name: Upload Artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-failure-screenshots
          path: failed_screenshots/