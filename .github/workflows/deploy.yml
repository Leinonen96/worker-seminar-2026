name: Deploy to DigitalOcean

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy project files to Droplet via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USERNAME }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          # EI kopioi testituloksia
          source: ".,!e2e-tests/results"
          target: "/home/${{ secrets.DROPLET_USERNAME }}/worker-app"

      - name: Build and deploy containers via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USERNAME }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          command_timeout: 30m
          script: |
            cd /home/${{ secrets.DROPLET_USERNAME }}/worker-app
            
            # 1. Ympäristömuuttujat
            echo "AUTH0_ISSUER=${{ secrets.AUTH0_ISSUER }}" > .env
            echo "AUTH0_AUDIENCE=${{ secrets.AUTH0_AUDIENCE }}" >> .env
            
            echo "VITE_API_URL=${{ secrets.VITE_API_URL }}" > frontend/workerfrontend/.env
            echo "VITE_AUTH_DOMAIN=${{ secrets.VITE_AUTH_DOMAIN }}" >> frontend/workerfrontend/.env
            echo "VITE_AUTH_CLIENT_ID=${{ secrets.VITE_AUTH_CLIENT_ID }}" >> frontend/workerfrontend/.env
            echo "VITE_AUTH_AUDIENCE=${{ secrets.VITE_AUTH_AUDIENCE }}" >> frontend/workerfrontend/.env
            echo "VITE_GOOGLE_MAPS_API_KEY=${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}" >> frontend/workerfrontend/.env
            echo "VITE_DISABLE_AUTH0=${{ secrets.VITE_DISABLE_AUTH0 }}" >> frontend/workerfrontend/.env
            
            # 2. Käynnistä sovellus
            docker compose down
            docker compose up -d --build
            
            echo "Odotetaan sovelluksen heräämistä..."
            sleep 20 

            # 3. Siivoa testitulokset Dockerin avulla (kiertää sudon)
            docker run --rm -v $(pwd)/e2e-tests:/app alpine rm -rf /app/results/*
            
            # 4. Aja testit
            docker compose --profile e2e up robot --build --abort-on-container-exit
            
            # 5. Siivous
            docker image prune -f