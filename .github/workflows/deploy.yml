name: Deploy to DigitalOcean

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy project files to Droplet via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USERNAME }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          source: ".,!e2e-tests/results"
          target: "/home/${{ secrets.DROPLET_USERNAME }}/worker-app"

      - name: Build and deploy containers via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USERNAME }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          command_timeout: 30m
          script: |
            cd /home/${{ secrets.DROPLET_USERNAME }}/worker-app

            # 1. Luodaan .env-tiedostot suoraan secreteistä (maskaus toimii)
            printf 'AUTH0_ISSUER=%s\n' "${{ secrets.AUTH0_ISSUER }}" > .env
            printf 'AUTH0_AUDIENCE=%s\n' "${{ secrets.AUTH0_AUDIENCE }}" >> .env

            printf 'VITE_API_URL=%s\n' "${{ secrets.VITE_API_URL }}" > frontend/workerfrontend/.env
            printf 'VITE_AUTH_DOMAIN=%s\n' "${{ secrets.VITE_AUTH_DOMAIN }}" >> frontend/workerfrontend/.env
            printf 'VITE_AUTH_CLIENT_ID=%s\n' "${{ secrets.VITE_AUTH_CLIENT_ID }}" >> frontend/workerfrontend/.env
            printf 'VITE_AUTH_AUDIENCE=%s\n' "${{ secrets.VITE_AUTH_AUDIENCE }}" >> frontend/workerfrontend/.env
            printf 'VITE_GOOGLE_MAPS_API_KEY=%s\n' "${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}" >> frontend/workerfrontend/.env
            printf 'VITE_DISABLE_AUTH0=%s\n' "${{ secrets.VITE_DISABLE_AUTH0 }}" >> frontend/workerfrontend/.env

            # 2. Pakota frontend rebuilttaamaan ilman cachea
            docker compose down
            docker compose build --no-cache frontend
            docker compose up -d --build

            # 3. Siivoa testitulokset
            docker run --rm -v $(pwd)/e2e-tests:/app alpine rm -rf /app/results/*

            # 4. Aja testit
            docker compose --profile e2e up robot --build --abort-on-container-exit

            # 5. Siivous
            docker image prune -f

      - name: Download Screenshots from server
        if: failure()
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USERNAME }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          source: "/home/${{ secrets.DROPLET_USERNAME }}/worker-app/e2e-tests/results/browser/screenshot/*.png"
          target: "failed_screenshots"
          strip_components: 6

      - name: Upload Artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-failure-screenshots
          path: failed_screenshots/
