name: PR Deployment Test

on:
  pull_request:
    branches: [ main ]

jobs:
  test-build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run Backend Unit Tests
        run: |
          cd backend
          mvn test
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Robot Framework dependencies
        run: |
          pip install robotframework robotframework-browser
          rfbrowser init

      - name: Build and Start Containers
        run: |
          # Käytetään GitHub Secrets -arvoja .env-tiedostoon
          echo "AUTH0_ISSUER=${{ secrets.AUTH0_ISSUER }}" >> .env
          echo "AUTH0_AUDIENCE=${{ secrets.AUTH0_AUDIENCE }}" >> .env
          docker compose up -d --build

      - name: Wait for services to be ready
        run: |
          # Odotetaan, että backend vastaa
          timeout 60s bash -c 'until curl -s localhost:8080/health; do sleep 5; done'

      - name: Run E2E Tests (Headless)
        run: |
          # Ajetaan Robot-testit headless-tilassa
          robot --outputdir results e2e-tests/

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-results
          path: results/

      - name: Shutdown
        if: always()
        run: docker compose down