name: PR Deployment Test

on:
  pull_request:
    branches: [ main ]

jobs:
  test-build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Robot Framework dependencies
        run: |
          pip install robotframework robotframework-browser
          rfbrowser init

      - name: Build and Start Containers
        run: |
          # Use a test-specific env or dummy values for CI
          echo "AUTH0_ISSUER=${{ secrets.AUTH0_ISSUER }}" >> .env
          echo "AUTH0_AUDIENCE=${{ secrets.AUTH0_AUDIENCE }}" >> .env
          docker compose up -d --build

      - name: Wait for services to be ready
        run: |
          # Wait for the backend to respond
          timeout 60s bash -c 'until curl -s localhost:8080/health; do sleep 5; done'

      - name: Run E2E Tests (Headless)
        run: |
          robot --variable HEADLESS:${True} --variable BASE_URL:http://localhost:80 --outputdir results e2e-tests/

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-results
          path: results/

      - name: Shutdown
        if: always()
        run: docker compose down